version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: clinica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clinica-net

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"
    networks:
      - clinica-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - clinica-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - clinica-net

  auth-service:
    build: ./auth-service
    depends_on:
      - postgres
      - eureka-server
      - kafka
    ports:
      - "8091:8091"
    networks:
      - clinica-net
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

  client-service:
    build: ./client-service
    depends_on:
      - postgres
      - kafka
      - eureka-server
    ports:
      - "8092:8092"
    networks:
      - clinica-net
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

  pet-service:
    build: ./pet-service
    depends_on:
      - postgres
      - kafka
      - eureka-server
    ports:
      - "8093:8093"
    networks:
      - clinica-net
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

  vet-service:
    build: ./vet-service
    depends_on:
      - postgres
      - kafka
      - eureka-server
    ports:
      - "8094:8094"
    networks:
      - clinica-net
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

  appointment-service:
    build: ./appointment-service
    depends_on:
      - postgres
      - kafka
      - eureka-server
    ports:
      - "8095:8095"
    networks:
      - clinica-net
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

  medical-history-service:
    build: ./medical-history-service
    depends_on:
      - postgres
      - kafka
      - eureka-server
    ports:
      - "8096:8096"
    networks:
      - clinica-net
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

  api-gateway:
    build: ./api-gateway
    ports:
      - "8090:8090"
    depends_on:
      - eureka-server
    networks:
      - clinica-net
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true

networks:
  clinica-net:
    driver: bridge

volumes:
  postgres_data:
