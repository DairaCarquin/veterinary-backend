spring.application.name=api-gateway
server.port=8090

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.default-filters[0]=StripPrefix=1

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://auth-service:8091
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth-service/**

spring.cloud.gateway.routes[1].id=client-service
spring.cloud.gateway.routes[1].uri=http://client-service:8092
spring.cloud.gateway.routes[1].predicates[0]=Path=/client-service/**

spring.cloud.gateway.routes[2].id=pet-service
spring.cloud.gateway.routes[2].uri=http://pet-service:8093
spring.cloud.gateway.routes[2].predicates[0]=Path=/pet-service/**

spring.cloud.gateway.routes[3].id=vet-service
spring.cloud.gateway.routes[3].uri=http://vet-service:8094
spring.cloud.gateway.routes[3].predicates[0]=Path=/vet-service/**

spring.cloud.gateway.routes[4].id=appointment-service
spring.cloud.gateway.routes[4].uri=http://appointment-service:8095
spring.cloud.gateway.routes[4].predicates[0]=Path=/appointment-service/**

spring.cloud.gateway.routes[5].id=medical-history-service
spring.cloud.gateway.routes[5].uri=http://medical-history-service:8096
spring.cloud.gateway.routes[5].predicates[0]=Path=/medical-history-service/**

management.endpoints.web.exposure.include=health

eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${spring.application.name}

logging.level.org.springframework.security=DEBUG
